{% extends 'base.html' %}

{% block title %}ログイン - まいおぴ{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <h2>ログイン</h2>
        <p class="auth-subtitle">メモを取る準備をしましょう</p>

        <form action="{{ url_for('main.login') }}" method="POST">
            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">ログイン状態を保持する</label>
            </div>

            <div class="auth-actions">
                <button type="submit" class="btn-primary">ログイン</button>
            </div>
        </form>

        <div class="auth-footer">
            <p>アカウントをお持ちでないですか？ <a href="{{ url_for('main.signup') }}">新規登録</a></p>
        </div>
    </div>
</section>
{% endblock %}
