{% extends 'base.html' %}

{% block title %}ログイン - まいおぴ{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">ログイン</h2>
                        <p class="text-muted">自分の意見を育てる場所へ</p>
                    </div> <!-- .text-center -->

                    <form action="{{ url_for('main.login') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label" for="email">メールアドレス</label>
                            <input id="email" class="form-control" type="email" name="email" placeholder="example@mail.com" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">パスワード</label>
                            <input id="password" class="form-control" type="password" name="password" placeholder="" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input id="rememberf" class="form-check-input" type="checkbox" name="remember">
                            <label class="form-check-label" for="remember">ログイン状態を保持する</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary py-2" type="submit">ログイン</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">アカウントをお持ちでないですか？</p>
                        <a class="text-decoration-none" href="{{ url_for('main.signup') }}">新規登録はこちら</a>
                    </div>
                </div> <!-- .card-body -->
            </div> <!-- .card -->
        </div> <!-- .col-md-5 -->
    </div> <!-- .row -->
</div> <!-- .container -->
{% endblock %}
