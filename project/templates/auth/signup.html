{% extends 'base.html' %}

{% block title %}新規登録 - まいおぴ{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">新規登録</h2>
                        <p class="text-muted">あなただけの「まいおぴ」を始めましょう</p>
                    </div>

                    <form action="{{ url_for('main.signup') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">ユーザー名</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="お名前" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">メールアドレス</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="example@mail.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">パスワード</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary py-2">アカウントを作成</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">既にアカウントをお持ちですか？</p>
                        <a href="{{ url_for('main.login') }}" class="text-decoration-none">ログインはこちら</a>
                    </div>
                </div> </div> </div> </div> </div> {% endblock %}
